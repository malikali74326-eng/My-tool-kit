<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>LOGIN · FAHAD TECH</title>
    <style>
        /* ============================================================
           RESET & BASE — CLEAN WHITE THEME
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #f5f7fa, #e8ecf1);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        /* Subtle background decoration */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background: radial-gradient(circle at 20% 30%, rgba(255, 0, 100, 0.04) 0%, transparent 50%),
                        radial-gradient(circle at 80% 70%, rgba(0, 200, 255, 0.04) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* ============================================================
           LOGIN CONTAINER — CLEAN & PROFESSIONAL
           ============================================================ */
        .login-container {
            width: min(400px, 95%);
            max-width: 400px;
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 28px;
            padding: 32px 28px 28px;
            border: 2px solid transparent;
            background-image: linear-gradient(rgba(255, 255, 255, 0.95), rgba(255, 255, 255, 0.95)), 
                              linear-gradient(135deg, #ff0066, #ff6600, #ffcc00, #00ff88, #0066ff, #9900ff);
            background-origin: border-box;
            background-clip: padding-box, border-box;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08), 0 8px 30px rgba(0, 0, 0, 0.04);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }

        .login-container:hover {
            box-shadow: 0 25px 70px rgba(0, 0, 0, 0.12), 0 10px 40px rgba(0, 0, 0, 0.05);
        }

        /* ============================================================
           HEADER
           ============================================================ */
        .login-header {
            text-align: center;
            margin-bottom: 10px;
        }

        .login-header h1 {
            font-size: 2.2rem;
            font-weight: 900;
            background: linear-gradient(135deg, #ff0066, #ff6600, #ffcc00, #00ff88, #0066ff, #9900ff);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: rainbowText 6s ease-in-out infinite;
            letter-spacing: 1px;
            line-height: 1.2;
        }

        @keyframes rainbowText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .login-header p {
            color: #8899aa;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: rgba(0, 0, 0, 0.03);
            padding: 4px 18px;
            border-radius: 50px;
            display: inline-block;
            border: 1px solid rgba(0, 0, 0, 0.04);
        }

        /* ============================================================
           LOGIN SMALL TITLE
           ============================================================ */
        .login-big {
            text-align: center;
            margin: 4px 0 14px;
        }

        .login-big h2 {
            font-size: 1rem;
            font-weight: 600;
            color: #667788;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* ============================================================
           INPUT FIELDS
           ============================================================ */
        .input-group {
            margin-bottom: 16px;
            position: relative;
        }

        .input-group label {
            display: block;
            color: #445566;
            font-size: 0.7rem;
            font-weight: 700;
            margin-bottom: 4px;
            margin-left: 6px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            background: #f0f2f5;
            border: 2px solid transparent;
            border-radius: 14px;
            padding: 14px 18px;
            color: #1a1a2e;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            outline: none;
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .input-group input:focus {
            border-color: #ff0066;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(255, 0, 100, 0.06), inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .input-group input::placeholder {
            color: #99aabb;
            font-weight: 400;
        }

        .password-wrapper {
            position: relative;
            width: 100%;
        }

        .password-wrapper input {
            width: 100%;
            padding-right: 48px;
        }

        /* ============================================================
           TOGGLE PASSWORD
           ============================================================ */
        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #8899aa;
            font-size: 1.1rem;
            user-select: none;
            transition: all 0.3s ease;
            z-index: 10;
            background: transparent;
            border: none;
            padding: 4px;
        }

        .toggle-password:hover {
            color: #ff0066;
            transform: translateY(-50%) scale(1.1);
        }

        /* ============================================================
           LOGIN BUTTON — COLORFUL ANIMATION
           ============================================================ */
        .login-btn {
            width: 100%;
            background: linear-gradient(135deg, #ff0066, #ff6600, #ffcc00, #00ff88, #0066ff, #9900ff);
            background-size: 300% 300%;
            animation: rainbowText 6s ease-in-out infinite;
            border: none;
            border-radius: 14px;
            padding: 14px;
            color: #ffffff;
            font-size: 1.05rem;
            font-weight: 800;
            cursor: pointer;
            margin: 14px 0 10px;
            box-shadow: 0 4px 25px rgba(255, 0, 100, 0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .login-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, #ff6600, #ffcc00, #00ff88, #0066ff, #9900ff, #ff0066);
            background-size: 300% 300%;
            animation: rainbowText 4s ease-in-out infinite;
            opacity: 0;
            transition: opacity 0.4s;
        }

        .login-btn:hover::before {
            opacity: 1;
        }

        .login-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 8px 40px rgba(255, 0, 100, 0.25);
        }

        .login-btn:active {
            transform: translateY(0px) scale(0.98);
        }

        .login-btn span {
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           TIMER BOX
           ============================================================ */
        .timer-box {
            background: rgba(255, 200, 200, 0.15);
            border-radius: 14px;
            padding: 10px 14px;
            text-align: center;
            color: #cc3344;
            margin: 10px 0;
            border: 1.5px solid rgba(255, 0, 50, 0.15);
            display: none;
            font-size: 0.85rem;
            font-weight: 600;
        }

        /* ============================================================
           ADMIN BUTTON
           ============================================================ */
        .admin-section {
            text-align: center;
            margin: 8px 0 4px;
        }

        .admin-btn {
            background: linear-gradient(135deg, #25D366, #128C7E);
            color: white;
            padding: 12px 28px;
            border-radius: 14px;
            text-decoration: none;
            font-weight: 700;
            display: inline-block;
            border: 1px solid rgba(255, 255, 255, 0.15);
            font-size: 0.9rem;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.15);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            letter-spacing: 0.5px;
        }

        .admin-btn:hover {
            transform: translateY(-3px) scale(1.03);
            box-shadow: 0 8px 35px rgba(37, 211, 102, 0.3);
            background: linear-gradient(135deg, #128C7E, #25D366);
        }

        .admin-btn:active {
            transform: translateY(0px) scale(0.97);
        }

        /* ============================================================
           FOOTER
           ============================================================ */
        .login-footer {
            text-align: center;
            margin-top: 18px;
            color: #8899aa;
            font-size: 0.7rem;
            border-top: 1px solid rgba(0, 0, 0, 0.04);
            padding-top: 14px;
            line-height: 1.8;
            letter-spacing: 0.3px;
        }

        .login-footer p {
            margin: 2px 0;
        }

        /* ============================================================
           ERROR MESSAGE
           ============================================================ */
        .error-msg {
            color: #cc3344;
            text-align: center;
            margin: 4px 0 8px;
            font-size: 0.8rem;
            font-weight: 700;
            min-height: 24px;
        }

        /* ============================================================
           RESPONSIVE — PERFECT FOR 360px TO 580px
           ============================================================ */
        @media (max-width: 420px) {
            .login-container {
                padding: 24px 18px 22px;
                border-radius: 24px;
            }
            .login-header h1 {
                font-size: 1.8rem;
            }
            .login-big h2 {
                font-size: 0.85rem;
            }
            .login-btn {
                padding: 12px;
                font-size: 0.95rem;
                border-radius: 12px;
            }
            .input-group input {
                padding: 12px 16px;
                font-size: 0.85rem;
                border-radius: 12px;
            }
            .admin-btn {
                padding: 10px 22px;
                font-size: 0.8rem;
            }
            .toggle-password {
                font-size: 1rem;
                right: 14px;
            }
        }

        @media (min-width: 421px) and (max-width: 580px) {
            .login-container {
                padding: 28px 22px 24px;
                border-radius: 26px;
            }
            .login-header h1 {
                font-size: 2rem;
            }
            .login-big h2 {
                font-size: 0.9rem;
            }
        }

        @media (min-width: 581px) {
            .login-container {
                padding: 36px 32px 30px;
                border-radius: 32px;
            }
            .login-header h1 {
                font-size: 2.4rem;
            }
            .login-big h2 {
                font-size: 1rem;
            }
        }

        /* ============================================================
           SCROLLBAR
           ============================================================ */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: #f0f2f5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #ff0066, #ff6600, #ffcc00, #00ff88, #0066ff, #9900ff);
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <!-- ===== HEADER ===== -->
        <div class="login-header">
            <h1>𝕄𝔸𝕃𝕀𝕂-𝕏 ℍ𝟜ℂ𝕂𝕊</h1>
            <p>🔐 SECURE ACCESS</p>
        </div>

        <!-- ===== LOGIN TITLE — SMALL TEXT ===== -->
        <div class="login-big">
            <h2>Login First</h2>
        </div>

        <!-- ===== ERROR MESSAGE ===== -->
        <div id="errorMsg" class="error-msg"></div>

        <!-- ===== TIMER BOX ===== -->
        <div id="timerBox" class="timer-box">
            ⏳ Too many attempts. Wait <span id="timerSeconds">120</span> seconds
        </div>

        <!-- ===== USERNAME ===== -->
        <div class="input-group">
            <label>Username</label>
            <input type="text" id="username" placeholder="Enter your username" autocomplete="off">
        </div>

        <!-- ===== PASSWORD ===== -->
        <div class="input-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="Enter your password" autocomplete="off">
                <button class="toggle-password" id="togglePassword" onclick="togglePasswordVisibility()" type="button" aria-label="Toggle password visibility">👁️</button>
            </div>
        </div>

        <!-- ===== LOGIN BUTTON ===== -->
        <button class="login-btn" onclick="attemptLogin()"><span>✦ ACCESS TOOLKIT ✦</span></button>

        <!-- ===== ADMIN BUTTON ===== -->
        <div class="admin-section">
            <a href="https://wa.me/923267432696?text=Hello%20Sir%20Give%20Me%20Login%20Keys" class="admin-btn" target="_blank">👑 Contact Admin</a>
        </div>

        <!-- ===== FOOTER ===== -->
        <div class="login-footer">
            <p>© 2026 MALIK-X H4CKER —
            <p> All Rights Reserved</p>
           
        </div>
    </div>

    <script>
        // ============================================================
        // TOGGLE PASSWORD VISIBILITY
        // ============================================================
        function togglePasswordVisibility() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('togglePassword');

            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.textContent = '🔒';
            } else {
                passwordInput.type = 'password';
                toggleIcon.textContent = '👁️';
            }
        }

        // ============================================================
        // LOGIN CREDENTIALS
        // ============================================================
        const VALID_USERNAME = "Malik123";
        const VALID_PASSWORD = "Ali Raza";

        let failedAttempts = 0;
        let lockUntil = 0;

        // ============================================================
        // ATTEMPT LOGIN
        // ============================================================
        function attemptLogin() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const errorDiv = document.getElementById('errorMsg');
            const timerBox = document.getElementById('timerBox');
            const timerSpan = document.getElementById('timerSeconds');

            const now = Date.now();

            // ===== CHECK LOCK =====
            if (lockUntil > now) {
                const remainingSeconds = Math.ceil((lockUntil - now) / 1000);
                timerBox.style.display = 'block';
                timerSpan.textContent = remainingSeconds;
                errorDiv.textContent = `⛔ Locked. Wait ${remainingSeconds}s`;

                setTimeout(() => {
                    attemptLogin();
                }, 1000);
                return;
            } else {
                timerBox.style.display = 'none';
            }

            // ===== VALIDATE =====
            if (username === VALID_USERNAME && password === VALID_PASSWORD) {
                // ✅ SUCCESS — REDIRECT TO TOOLKIT
                window.location.href = 'toolkit.html';
            } else {
                // ❌ FAILED
                failedAttempts++;

                if (failedAttempts >= 3) {
                    // 🔒 LOCK FOR 2 MINUTES
                    lockUntil = now + (2 * 60 * 1000);
                    timerBox.style.display = 'block';
                    timerSpan.textContent = 120;
                    errorDiv.textContent = '❌ Too many wrong attempts. Locked for 2 minutes.';

                    // Auto unlock after 2 minutes
                    setTimeout(() => {
                        failedAttempts = 0;
                        lockUntil = 0;
                        timerBox.style.display = 'none';
                        errorDiv.textContent = '';
                    }, 2 * 60 * 1000);
                } else {
                    errorDiv.textContent = `❌ Invalid credentials. ${3 - failedAttempts} attempt(s) left.`;
                }
            }
        }

        // ============================================================
        // ENTER KEY SUPPORT
        // ============================================================
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                attemptLogin();
            }
        });

        // ============================================================
        // CLEAR ERROR ON INPUT
        // ============================================================
        document.getElementById('username').addEventListener('input', function() {
            document.getElementById('errorMsg').textContent = '';
        });
        document.getElementById('password').addEventListener('input', function() {
            document.getElementById('errorMsg').textContent = '';
        });
    </script>
</body>
</html>
